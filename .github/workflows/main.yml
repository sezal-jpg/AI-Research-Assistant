name: AI Research Assistant CI

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

jobs:

  backend-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Cache Backend Dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-backend-${{ hashFiles('backend/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-backend-

      - name: Install Backend Dependencies
        run: |
          cd backend
          pip install -r requirements.txt

      - name: Check Backend Syntax
        run: |
          python -m compileall backend

      - name: Verify Backend Imports
        run: |
          cd backend
          python -c "import fastapi"
          python -c "import chromadb"
          python -c "import langchain"

      - name: Backend Check Complete
        run: echo "Backend validation successful!"

  frontend-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Cache Frontend Dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-frontend-${{ hashFiles('frontend/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-frontend-

      - name: Install Frontend Dependencies
        run: |
          cd frontend
          pip install -r requirements.txt

      - name: Check Frontend Syntax
        run: |
          python -m py_compile frontend/frontend.py

      - name: Verify Frontend Imports
        run: |
          cd frontend
          python -c "import streamlit"
          python -c "import requests"

      - name: Frontend Check Complete
        run: echo "Frontend validation successful!"

  docker-build:
    runs-on: ubuntu-latest

    needs:
      - backend-check
      - frontend-check

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Backend Docker Image
        run: |
          docker build -t ai-backend ./backend

      - name: Build Frontend Docker Image
        run: |
          docker build -t ai-frontend ./frontend

      - name: Docker Build Complete
        run: echo "Docker images built successfully!"
