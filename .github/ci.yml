name: AI Research Assistant CI

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

jobs:

  backend-check:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install Backend Dependencies
        run: |
          cd backend
          pip install -r requirements.txt

      - name: Check Backend Syntax
        run: |
          python -m py_compile backend/api.py
          python -m py_compile backend/rag.py
          python -m py_compile backend/retriever.py
          python -m py_compile backend/config.py

      - name: Verify Backend Imports
        run: |
          cd backend
          python -c "import fastapi"
          python -c "import chromadb"
          python -c "import langchain"

  frontend-check:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install Frontend Dependencies
        run: |
          cd frontend
          pip install -r requirements.txt

      - name: Check Frontend Syntax
        run: |
          python -m py_compile frontend/frontend.py

      - name: Verify Requests Module
        run: |
          cd frontend
          python -c "import requests"

      - name: Workflow Completed
        run: echo "Frontend checks passed!"
    docker-build:

    runs-on: ubuntu-latest

    needs:
      - backend-check
      - frontend-check

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Backend Docker Image
        run: |
          docker build -t ai-backend ./backend

      - name: Build Frontend Docker Image
        run: |
          docker build -t ai-frontend ./frontend

      - name: Docker Build Successful
        run: echo "Docker images built successfully!"